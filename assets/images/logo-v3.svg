<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="v3-navy-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a3a6b"/>
      <stop offset="100%" stop-color="#03244d"/>
    </linearGradient>
    <linearGradient id="v3-orange-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F26522"/>
      <stop offset="100%" stop-color="#d4550f"/>
    </linearGradient>
    <clipPath id="v3-rect-clip">
      <rect x="0" y="0" width="400" height="200" rx="8"/>
    </clipPath>
  </defs>

  <!-- Background rounded rectangle -->
  <rect width="400" height="200" rx="8" fill="url(#v3-navy-grad)"/>

  <!-- Faint Samford Hall / campus silhouette -->
  <g clip-path="url(#v3-rect-clip)" opacity="0.06" fill="#FFFFFF">
    <!-- Ground -->
    <rect x="0" y="145" width="400" height="55"/>
    <!-- Samford Hall main body -->
    <rect x="160" y="95" width="100" height="50"/>
    <!-- Tower -->
    <rect x="190" y="50" width="40" height="45"/>
    <!-- Spire -->
    <polygon points="210,20 190,50 230,50"/>
    <!-- Dome -->
    <ellipse cx="210" cy="52" rx="22" ry="7"/>
    <!-- Left buildings -->
    <rect x="80" y="110" width="80" height="35"/>
    <rect x="85" y="102" width="30" height="8"/>
    <rect x="40" y="120" width="40" height="25"/>
    <!-- Right buildings -->
    <rect x="260" y="110" width="80" height="35"/>
    <rect x="290" y="100" width="25" height="10"/>
    <rect x="340" y="115" width="45" height="30"/>
    <!-- Trees -->
    <circle cx="30" cy="125" r="16"/>
    <circle cx="370" cy="120" r="18"/>
    <circle cx="145" cy="118" r="12"/>
    <circle cx="255" cy="118" r="12"/>
  </g>

  <!-- Orange bar accent on left side -->
  <rect x="0" y="0" width="8" height="200" rx="0" fill="url(#v3-orange-grad)"/>
  <!-- Secondary thin orange line -->
  <rect x="14" y="30" width="2" height="140" fill="#F26522" opacity="0.4"/>

  <!-- BUY text -->
  <text x="50" y="95" font-family="Arial Black, Arial, Helvetica, sans-serif" font-weight="900" font-size="58" fill="#FFFFFF" letter-spacing="5">BUY</text>

  <!-- AUBURN text -->
  <text x="50" y="145" font-family="Arial Black, Arial, Helvetica, sans-serif" font-weight="900" font-size="52" fill="#F26522" letter-spacing="3">AUBURN</text>

  <!-- SUPPORT THE AUBURN FAMILY tagline -->
  <text x="52" y="175" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="11" fill="#FFFFFF" letter-spacing="2.5" opacity="0.8">SUPPORT THE AUBURN FAMILY</text>

  <!-- Subtle bottom orange accent line -->
  <rect x="50" y="155" width="160" height="1.5" fill="#F26522" opacity="0.4"/>
</svg>