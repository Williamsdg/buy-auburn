<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Directory — Auburn Business Network</title>
  <meta name="description" content="Browse Auburn family-owned businesses by city and industry. Find Auburn-owned spots wherever you travel.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* === Reset & Base === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #03244d;
      --navy-light: #0a3a6b;
      --navy-mid: #071e3d;
      --navy-dark: #020e1f;
      --orange: #F26522;
      --orange-hover: #d4550f;
      --amber: #f59e0b;
      --green: #22c55e;
      --purple: #a855f7;
      --white: #ffffff;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.3);
      --shadow-lg: 0 8px 30px rgba(0,0,0,0.4);
      --radius: 8px;
      --radius-lg: 12px;
      --transition: 0.25s ease;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: rgba(255,255,255,0.9);
      background: var(--navy-dark);
      background-image:
        radial-gradient(ellipse at top left, rgba(242,101,34,0.03), transparent 50%),
        radial-gradient(ellipse at bottom right, rgba(10,58,107,0.2), transparent 50%);
      background-attachment: fixed;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }
    button { cursor: pointer; border: none; font-family: inherit; }
    input, select, textarea { font-family: inherit; font-size: inherit; }

    h1, h2, h3, h4 { line-height: 1.2; color: var(--white); }
    h1 { font-size: 2.75rem; font-weight: 800; }
    h2 { font-size: 2rem; font-weight: 700; }
    h3 { font-size: 1.35rem; font-weight: 600; }
    h4 { font-size: 1.1rem; font-weight: 600; }

    .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

    /* === Navigation === */
    .navbar {
      background: var(--navy);
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 2px 20px rgba(0,0,0,0.4);
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .navbar .container { display: flex; align-items: center; justify-content: space-between; height: 70px; }
    .nav-brand { display: flex; align-items: center; gap: 12px; color: var(--white); font-weight: 700; font-size: 1.2rem; }
    .nav-brand .brand-icon { width: 40px; height: 40px; background: var(--orange); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.1rem; }
    .nav-links { display: flex; align-items: center; gap: 8px; list-style: none; }
    .nav-links a { color: rgba(255,255,255,0.7); padding: 8px 16px; border-radius: var(--radius); font-size: 0.95rem; font-weight: 500; transition: var(--transition); }
    .nav-links a:hover, .nav-links a.active { color: var(--white); background: rgba(255,255,255,0.1); }
    .nav-links .btn-nav { background: var(--orange); color: var(--white); padding: 8px 20px; font-weight: 600; }
    .nav-links .btn-nav:hover { background: var(--orange-hover); }

    .nav-toggle { display: none; flex-direction: column; gap: 5px; background: none; padding: 8px; }
    .nav-toggle span { width: 24px; height: 2px; background: var(--white); border-radius: 2px; transition: var(--transition); }

    /* === Directory Header === */
    .directory-header {
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
      padding: 48px 0 32px;
      color: var(--white);
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .directory-header h1 { color: var(--white); font-size: 2.25rem; margin-bottom: 8px; }
    .directory-header p { color: rgba(255,255,255,0.6); }

    /* === Filters Bar === */
    .filters-bar {
      background: var(--navy-mid);
      padding: 20px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      position: sticky;
      top: 70px;
      z-index: 100;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    .filters-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .filter-group { flex: 1; min-width: 180px; }
    .filter-group label {
      display: block; font-size: 0.75rem; font-weight: 600;
      color: rgba(255,255,255,0.45); text-transform: uppercase;
      letter-spacing: 0.5px; margin-bottom: 4px;
    }
    .filter-group select, .filter-group input {
      width: 100%; padding: 10px 14px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius);
      font-size: 0.9rem;
      color: var(--white);
      background: rgba(0,0,0,0.25);
      outline: none;
      transition: var(--transition);
    }
    .filter-group select option { background: var(--navy); color: var(--white); }
    .filter-group select:focus, .filter-group input:focus { border-color: var(--orange); }
    .filter-group input::placeholder { color: rgba(255,255,255,0.3); }

    /* === Results === */
    .results-count { padding: 20px 0 0; color: rgba(255,255,255,0.5); font-size: 0.95rem; }
    .results-count strong { color: var(--orange); }
    .directory-results { padding: 24px 0 80px; }
    .no-results { text-align: center; padding: 80px 0; }
    .no-results h3 { margin-bottom: 8px; }
    .no-results p { color: rgba(255,255,255,0.5); }

    /* === Business Card Grid === */
    .business-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }

    /* === Trading Card (Dark Theme) === */
    .business-card {
      background: linear-gradient(145deg, var(--navy) 0%, #0a3a6b 50%, var(--orange) 100%);
      border-radius: 16px;
      padding: 6px;
      cursor: pointer;
      transition: transform 0.4s ease, box-shadow 0.4s ease;
      position: relative;
    }
    .business-card::before {
      content: '';
      position: absolute; inset: 0;
      border-radius: 16px;
      background: linear-gradient(145deg, rgba(242,101,34,0.4), transparent 40%, rgba(242,101,34,0.3));
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none; z-index: 1;
    }
    .business-card:hover { transform: translateY(-8px) scale(1.02); box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 20px rgba(242,101,34,0.2); }
    .business-card:hover::before { opacity: 1; }

    .card-inner {
      background: linear-gradient(160deg, var(--navy-mid), var(--navy));
      border-radius: 12px; overflow: hidden;
      position: relative; z-index: 2;
    }
    .card-top-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 14px;
      background: rgba(0,0,0,0.2);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .card-type-badge { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--amber); }
    .card-we-badge {
      width: 28px; height: 28px;
      background: var(--orange); color: var(--white); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem; font-weight: 800; letter-spacing: 0.5px;
      box-shadow: 0 2px 6px rgba(242,101,34,0.4);
    }
    .card-art {
      height: 140px;
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
      margin: 8px 10px; border-radius: 8px;
    }
    .card-art-pattern {
      position: absolute; inset: 0;
      background:
        radial-gradient(circle at 20% 80%, rgba(255,255,255,0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(255,255,255,0.08) 0%, transparent 50%),
        repeating-linear-gradient(45deg, transparent, transparent 20px, rgba(255,255,255,0.03) 20px, rgba(255,255,255,0.03) 22px);
      pointer-events: none;
    }
    .card-art-icon {
      width: 72px; height: 72px;
      background: rgba(255,255,255,0.15); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: var(--white); position: relative; z-index: 1;
      backdrop-filter: blur(4px);
      border: 2px solid rgba(255,255,255,0.2);
    }
    .card-art-icon svg { width: 34px; height: 34px; }

    .card-name-bar {
      padding: 12px 14px 6px;
      display: flex; align-items: center; gap: 8px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .card-name-bar h3 { font-size: 1.05rem; font-weight: 700; color: var(--white); line-height: 1.2; flex: 1; }
    .card-verified-dot {
      width: 10px; height: 10px;
      background: var(--orange); border-radius: 50%; flex-shrink: 0;
      box-shadow: 0 0 0 3px rgba(242,101,34,0.2);
    }

    .card-desc { padding: 4px 14px 10px; }
    .card-desc p {
      color: rgba(255,255,255,0.5); font-size: 0.82rem; line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }

    .card-stats { display: flex; gap: 6px; padding: 0 10px 10px; }
    .card-stat {
      flex: 1;
      background: rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px; padding: 8px 10px;
      display: flex; align-items: center; gap: 6px;
    }
    .card-stat .stat-icon { display: flex; color: var(--orange); }
    .card-stat .stat-icon svg { width: 14px; height: 14px; }
    .card-stat .stat-text { font-size: 0.75rem; font-weight: 600; color: rgba(255,255,255,0.8); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .card-bottom {
      padding: 10px 14px;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(0,0,0,0.2);
    }
    .card-brand { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,0.35); }
    .card-contact-actions { display: flex; gap: 4px; opacity: 0; transform: translateX(8px); transition: opacity 0.3s ease, transform 0.3s ease; }
    .business-card:hover .card-contact-actions { opacity: 1; transform: translateX(0); }

    .contact-action {
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6);
      transition: var(--transition);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .contact-action svg { width: 14px; height: 14px; }
    .contact-action:hover { background: var(--orange); color: var(--white); border-color: var(--orange); }

    /* === Buttons === */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 28px; border-radius: var(--radius);
      font-weight: 600; font-size: 0.95rem;
      transition: var(--transition); border: none;
    }
    .btn-primary { background: var(--orange); color: var(--white); }
    .btn-primary:hover { background: var(--orange-hover); }
    .btn-secondary { background: rgba(255,255,255,0.1); color: var(--white); }
    .btn-secondary:hover { background: rgba(255,255,255,0.15); }
    .btn-outline { background: transparent; color: var(--white); border: 2px solid rgba(255,255,255,0.2); }
    .btn-outline:hover { border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.06); }

    /* === Modal === */
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      z-index: 2000;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      opacity: 0; visibility: hidden;
      transition: var(--transition);
    }
    .modal-overlay.active { opacity: 1; visibility: visible; }
    .modal {
      background: var(--navy-mid);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radius-lg);
      max-width: 600px; width: 100%;
      max-height: 90vh; overflow-y: auto;
      transform: translateY(20px);
      transition: var(--transition);
    }
    .modal-overlay.active .modal { transform: translateY(0); }
    .modal-header {
      padding: 32px; color: var(--white);
      position: relative;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    }
    .modal-close {
      position: absolute; top: 16px; right: 16px;
      width: 36px; height: 36px;
      background: rgba(255,255,255,0.15); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: var(--white); font-size: 1.2rem;
      transition: var(--transition);
    }
    .modal-close:hover { background: rgba(255,255,255,0.25); }
    .modal-header .modal-icon {
      width: 60px; height: 60px;
      background: var(--orange); border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      color: var(--white); margin-bottom: 16px;
    }
    .modal-header .modal-icon svg { width: 30px; height: 30px; }
    .modal-header h2 { color: var(--white); font-size: 1.6rem; margin-bottom: 4px; }
    .modal-header .modal-industry { color: rgba(255,255,255,0.6); font-size: 0.9rem; }
    .modal-body { padding: 32px; }
    .modal-info-row { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 20px; }
    .modal-info-row svg { width: 20px; height: 20px; color: var(--orange); flex-shrink: 0; margin-top: 2px; }
    .modal-info-row .info-label { font-size: 0.8rem; color: rgba(255,255,255,0.45); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-bottom: 2px; }
    .modal-info-row .info-value { color: rgba(255,255,255,0.85); font-size: 0.95rem; }
    .modal-info-row .info-value a { color: var(--orange); font-weight: 500; }
    .modal-info-row .info-value a:hover { text-decoration: underline; }
    .modal-bio { margin-top: 24px; padding-top: 24px; border-top: 1px solid rgba(255,255,255,0.08); }
    .modal-bio h4 { margin-bottom: 8px; }
    .modal-bio p { color: rgba(255,255,255,0.65); line-height: 1.7; }
    .modal-actions {
      padding: 24px 32px;
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex; gap: 12px; flex-wrap: wrap;
    }
    .modal-actions .btn svg { width: 16px; height: 16px; margin-left: 4px; }

    /* === Footer === */
    .footer {
      background: var(--navy);
      color: rgba(255,255,255,0.5);
      padding: 40px 0;
      text-align: center;
      font-size: 0.9rem;
      border-top: 1px solid var(--orange);
    }
    .footer a { color: var(--orange); }
    .footer a:hover { text-decoration: underline; }

    /* === Responsive === */
    @media (max-width: 768px) {
      h1 { font-size: 2rem; }
      h2 { font-size: 1.6rem; }
      .nav-toggle { display: flex; }
      .nav-links {
        display: none; position: absolute; top: 70px; left: 0; right: 0;
        background: var(--navy); flex-direction: column;
        padding: 16px 24px; gap: 4px;
        box-shadow: var(--shadow-md);
        border-top: 1px solid rgba(255,255,255,0.06);
      }
      .nav-links.open { display: flex; }
      .nav-links a { padding: 12px 16px; width: 100%; }
      .business-grid { grid-template-columns: 1fr; }
      .filters-row { flex-direction: column; gap: 8px; }
      .filter-group { width: 100%; min-width: auto; }
      .modal-actions { flex-direction: column; }
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="nav-brand">
        <span class="brand-icon">AB</span>
        Auburn Business Network
      </a>
      <button class="nav-toggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="directory.html" class="active">Directory</a></li>
        <li><a href="apply.html" class="btn-nav">List Your Business</a></li>
      </ul>
    </div>
  </nav>

  <!-- Header -->
  <section class="directory-header">
    <div class="container">
      <h1>Business Directory</h1>
      <p>Find Auburn family-owned businesses by city or industry</p>
    </div>
  </section>

  <!-- Filters -->
  <div class="filters-bar">
    <div class="container">
      <div class="filters-row">
        <div class="filter-group">
          <label for="filter-location">City</label>
          <select id="filter-location" onchange="applyFilters()">
            <option value="">All Cities</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="filter-industry">Industry</label>
          <select id="filter-industry" onchange="applyFilters()">
            <option value="">All Industries</option>
          </select>
        </div>
        <div class="filter-group" style="flex:2;">
          <label for="filter-search">Search</label>
          <input type="text" id="filter-search" placeholder="Search by name, keyword, or owner..." oninput="applyFilters()">
        </div>
      </div>
    </div>
  </div>

  <!-- Results -->
  <div class="directory-results">
    <div class="container">
      <div class="results-count" id="results-count"></div>
      <div class="business-grid" id="results-grid" style="margin-top:20px;"></div>
      <div class="no-results" id="no-results" style="display:none;">
        <h3>No businesses found</h3>
        <p>Try adjusting your filters or search terms.</p>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 Auburn Business Network. War Eagle.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase-config.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/main.js?v=3"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await loadBusinesses();
      const industrySelect = document.getElementById('filter-industry');
      const locationSelect = document.getElementById('filter-location');

      getIndustries().forEach(ind => {
        industrySelect.innerHTML += `<option value="${ind}">${ind}</option>`;
      });
      getLocations().forEach(loc => {
        locationSelect.innerHTML += `<option value="${loc}">${loc}</option>`;
      });

      // Check URL params for pre-selected filters
      const params = new URLSearchParams(window.location.search);
      if (params.get('industry')) industrySelect.value = params.get('industry');
      if (params.get('location')) locationSelect.value = params.get('location');
      if (params.get('q')) document.getElementById('filter-search').value = params.get('q');

      applyFilters();
    });

    function applyFilters() {
      const industry = document.getElementById('filter-industry').value;
      const location = document.getElementById('filter-location').value;
      const query = document.getElementById('filter-search').value;

      const results = searchBusinesses({ query, industry, location });

      const grid = document.getElementById('results-grid');
      const noResults = document.getElementById('no-results');
      const countEl = document.getElementById('results-count');

      if (results.length === 0) {
        grid.style.display = 'none';
        noResults.style.display = 'block';
        countEl.innerHTML = '';
      } else {
        grid.style.display = '';
        noResults.style.display = 'none';
        grid.innerHTML = results.map(b => createBusinessCard(b)).join('');
        countEl.innerHTML = `Showing <strong>${results.length}</strong> business${results.length !== 1 ? 'es' : ''}`;
      }

      // Update URL params without reload
      const params = new URLSearchParams();
      if (industry) params.set('industry', industry);
      if (location) params.set('location', location);
      if (query) params.set('q', query);
      const newUrl = params.toString() ? `?${params.toString()}` : window.location.pathname;
      history.replaceState(null, '', newUrl);
    }
  </script>

</body>
</html>
